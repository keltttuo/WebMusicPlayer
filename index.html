<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Music Player</title>
    <link rel="stylesheet" href="styles.css">

    <script>
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        window.onload = function () {
            const authCookie = getCookie("auth");
            console.log("Auth cookie:", authCookie); // Debug log

            if (!authCookie) {
                window.location.href = "login.html";
                console.log("Auth cookie not found. Directing to login..."); // Debug log
            }
        };
    </script>

</head>
<body>
    <!-- Global Controls -->
    <header class="global-controls">
        <button id="global-play" class="play"><i class="fas fa-play"></i> Play All</button>
        <button id="global-pause" class="pause"><i class="fas fa-pause"></i> Pause All</button>
    </header>

    <!-- Main Playlist Section -->
    <section class="main-playlist">
        <h2>Main Playlists</h2>
        <div class="playlist-buttons">
            <button>Study</button>
            <button>Focus</button>
            <button>Relax</button>
        </div>
        <div class="controls">
            <label>Volume: <input type="range" id="main-volume" min="0" max="1" step="0.01" value="0.25"></label>
            <button id="main-play" class="play playing"><i class="fas fa-play"></i> Play</button>
            <button id="main-pause" class="pause"><i class="fas fa-pause"></i> Pause</button>
        </div>
        <audio id="audio-study" src="audio/study.mp3"></audio>
        <audio id="audio-focus" src="audio/focus.mp3"></audio>
        <audio id="audio-relax" src="audio/relax.mp3"></audio>
    </section>

    <!-- Ambient Playlist Section -->
    <section class="ambient-playlist">
        <h2>Ambient Sounds</h2>
        <div class="playlist-buttons">
            <button>Nature</button>
            <button>Water Flow</button>
            <button>Rain</button>
        </div>
        <div class="controls">
            <label>Volume: <input type="range" id="ambient-volume" min="0" max="1" step="0.01" value="0.5"></label>
            <button id="ambient-play" class="play playing"><i class="fas fa-play"></i> Play</button>
            <button id="ambient-pause" class="pause"><i class="fas fa-pause"></i> Pause</button>
        </div>
        <audio id="audio-nature" src="audio/nature.mp3"></audio>
        <audio id="audio-waterflow" src="audio/water.mp3"></audio>
        <audio id="audio-rain" src="audio/rain.mp3"></audio>
    </section>

    <!-- Relaxing Video Section -->
    <section class="video-section">
        <video controls autoplay muted loop>
            <source src="relaxing-video.mp4" type="video/mp4">
        </video>
    </section>

    <script src="script.js"></script>
</body>
</html>
